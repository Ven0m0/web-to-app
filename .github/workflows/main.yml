name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
    
    - name: Grant execute permission
      run: chmod +x gradlew || chmod +x ./gradlew || true

    - name: The Bulletproof Keystore Fix
      run: |
          # 1. Create a real dummy keystore file so Android doesn't crash
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 1000 -alias dummy -storepass password -keypass password -dname "CN=Dummy"
          
          # 2. Get the absolute path of the file we just made
          KS_PATH="$(pwd)/release.jks"
          
          # 3. Force every common variable to point to our new file
          echo "storeFile=$KS_PATH" >> gradle.properties
          echo "KEYSTORE_FILE=$KS_PATH" >> gradle.properties
          echo "RELEASE_STORE_FILE=$KS_PATH" >> gradle.properties
          
          # 4. Physically edit the Kotlin code to replace blank paths with our new file
          sed -i "s|file(\"\")|file(\"$KS_PATH\")|g" app/build.gradle.kts
          sed -i "s|file('')|file('$KS_PATH')|g" app/build.gradle.kts

    - name: Build Debug APK
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug --no-daemon --stacktrace --info
        elif [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info
        else
          echo "gradlew not found, trying gradle"
          gradle assembleDebug --no-daemon --stacktrace --info
        fi
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
    
    - name: List APK files
      if: always()
      run: find . -name "*.apk" -type f 2>/dev/null
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/**/*.apk
