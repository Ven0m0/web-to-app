version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - android
    open-pull-requests-limit: 10
    groups:
      gradle-all:
        patterns: ["*"]
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 10
    groups:
      github-actions-all:
        patterns: ["*"]
        update-types: [minor, patch]
